{% extends 'users/base.html' %}
{% block content %}

<div class="container" style="margin-top: 70px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark text-white p-4" style="border-radius:16px;">
                <h4 style="font-weight:700;">
                    ✏️ Edit <span style="color:#fd5e14;">Expense</span>
                </h4>
                <p style="color:#aaa;">Update the details of your expense.</p>
                <hr style="border-color:#444;">

                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label style="color:#aaa; font-size:13px;">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <small style="color:#ff6b6b;">{{ field.errors }}</small>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn w-50"
                                style="background-color:#fd5e14; color:white; font-weight:600; border-radius:8px;">
                            💾 Save Changes
                        </button>
                        <a href="{% url 'expenses' %}" class="btn w-50"
                           style="background-color:#333; color:white; border-radius:8px;">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
